name: base_template
description: "Base Template für die App-Fabrik – 100% echt, kein Mock"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.6.0
  riverpod_annotation: ^2.3.0
  go_router: ^14.0.0
  flutter_animate: ^4.5.0
  geolocator: ^14.0.2
  permission_handler: ^11.3.1
  purchases_flutter: ^9.13.1
  superwallkit_flutter: ^2.4.9
  firebase_core: ^3.6.0
  cloud_firestore: ^5.4.4
  flutter_native_splash: ^2.4.3
  cached_network_image: ^3.4.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  riverpod_generator: ^2.4.0
  build_runner: ^2.4.12

flutter:
  uses-material-design: true
  assets:
    - assets/fonts/
  fonts:
    - family: Satoshi
      fonts:
        - asset: assets/fonts/Satoshi-Regular.ttf
        - asset: assets/fonts/Satoshi-Medium.ttf
          weight: 500
        - asset: assets/fonts/Satoshi-Bold.ttf
          weight: 700